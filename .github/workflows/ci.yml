name: Java CI

on:
  push:
    branches:
      - "feature/**"
      - "release"
      - "main"

  pull_request:
    branches:
      - "release"
      - "main"

permissions:
  contents: read
  packages: write

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes
        run: mvn clean verify

      - name: Login no GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e publicar imagem no GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/lms-user-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/lms-user-service:latest
